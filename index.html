<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px;
    }
    h1 {
      text-align: center;
      margin: 10px 0 16px;
      font-size: 22px;
    }
    iframe {
      width: 100%;
      height: 92vh;
      border: none;
      background: #fff;
    }
    .fallback {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      opacity: 0.8;
    }
    a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>

  <script>
    (function () {
      // ✅ Put your PDF filename here (must match exactly)
      var pdf = "document.pdf";

      // Detect mobile/tablet reliably (covers iOS/Android + iPadOS)
      var isMobile =
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      // If on mobile/tablet, redirect immediately to full-screen PDF
      if (isMobile) {
        // Replace the current history entry so back button doesn't loop
        window.location.replace(pdf);
      }
    })();
  </script>
</head>

<body>
  <div class="wrap">
    <h1>Document Viewer</h1>

    <!-- Desktop embed -->
    <iframe src="document.pdf" title="PDF"></iframe>

    <!-- If redirect is blocked for any reason, user can still click -->
    <div class="fallback">
      If the PDF doesn’t open automatically, <a href="document.pdf">tap here</a>.
    </div>
  </div>
</body>
</html>
